name: Weekly Call Sheet

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  weekly-call-sheet:
    runs-on: ubuntu-latest
    env:
      TZ: America/Denver
      BATCH_SIZE: 20
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      PRINTER_EMAIL: ${{ secrets.PRINTER_EMAIL }}
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab

      - name: Generate weekly call sheet PDF
        run: python scripts/generate_weekly_call_sheet.py

      - name: Email PDF to Epson printer
        run: python scripts/send_weekly_call_sheet.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-call-sheet-pdf
          path: |
            generated/weekly_call_sheet.pdf
            generated/weekly_call_sheet_manifest.json

      - name: Commit updated progress tracker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/call_sheet_progress.json
          git diff --cached --quiet || git commit -m "Update weekly call sheet progress"
          git push
